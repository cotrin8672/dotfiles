"gpt-5.1-codex-max" = "gpt-5.2-codex"
"gpt-5.2-codex" = "gpt-5.3-codex"

[features]
shell_snapshot = true                 # 繰り返し実行するコマンドの処理速度を向上
apply_patch_freeform = true           # フリーフォーム形式のapply_patchツールを利用可能に
remote_compaction = true              # リモート圧縮を有効に
remote_models = true                  # 準備状態を表示する前にリモートモデルリストを更新
shell_tool = true                     # コマンド実行用のデフォルトツール「shell」を有効化
undo = true                           # ターン単位のUndo機能を有効に
powershell_utf8 = true                # UTF-8強制(文字化け対策)
experimental_windows_sandbox = true
elevated_windows_sandbox = true
multi_agent = true
use_linux_sandbox_bwrap = true
voice_transcription = true

[model_providers.glm]
name = "GLM"
base_url = "http://127.0.0.1:31415"
env_key = "GLM_API_KEY"
wire_api = "responses"

[profiles.glm]
model_provider = "glm"
model = "glm-4.7"

