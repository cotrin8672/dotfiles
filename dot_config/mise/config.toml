[tasks.nvim-startuptime-install]
description = "Install vim-startuptime via go install"
run = "go install github.com/rhysd/vim-startuptime@latest"

[tasks.nvim-startuptime]
description = "Measure Neovim startup time with vim-startuptime"
run = "vim-startuptime -vimpath nvim +qall"

