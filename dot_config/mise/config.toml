[tools]
bun = "latest"
fd = "latest"
go = "latest"
node = "22"
"npm:typescript" = "latest"
pnpm = "latest"
rg = "latest"
"npm:@openai/codex" = "latest"
"npm:@dotenvx/dotenvx" = "latest"
"npm:@playwright/cli" = "latest"
zoxide = "latest"
ghq = "latest"
claude-code = "latest"
zig = "latest"
"npm:@github/copilot" = "latest"
rust = "latest"

[tasks.nvim-startuptime-install]
description = "Install vim-startuptime via go install"
run = "go install github.com/rhysd/vim-startuptime@latest"

[tasks.nvim-startuptime]
description = "Measure Neovim startup time with vim-startuptime"
run = "vim-startuptime -vimpath nvim +qall"

[settings]
experimental = true
windows_shim_mode = "exe"
